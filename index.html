<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Final Markmaps Viewer</title>
    <!-- Meta tags for SEO -->
    <meta name="description" content="Interactive visual mind maps for CA Final preparation (AFM, Audit, FR, IDT, SPOM) rendered with markmap.js in a sleek VS Code style interface.">
    <meta name="keywords" content="CA Final, Markmap, Mindmap, AFM, Audit, FR, IDT, SPOM, Study Material">
    <meta name="author" content="Venketesh Swamy">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styling -->
    <link rel="stylesheet" href="index.css">
    
    <!-- Scripts: D3 & Markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18.12/dist/browser/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.min.js"></script>
</head>
<body class="theme-dark">
    <!-- Main layout container -->
    <div class="app-container">
        
        <!-- Mobile Header Bar -->
        <header class="mobile-header">
            <button id="mobile-menu-toggle" aria-label="Toggle Sidebar">
                <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <span class="mobile-title">CA Final Markmaps</span>
            <button id="mobile-theme-toggle" aria-label="Toggle Theme">
                <svg viewBox="0 0 24 24" class="icon sun-icon"><path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
            </button>
        </header>

        <!-- Sidebar Section -->
        <aside class="sidebar-wrapper" id="sidebar">
            
            <!-- VS Code Activity Bar -->
            <div class="activity-bar">
                <div class="top-items">
                    <button class="activity-btn active" id="btn-explorer" title="Explorer">
                        <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    </button>
                </div>
                <div class="bottom-items">
                    <button class="activity-btn" id="btn-theme-toggle" title="Toggle Light/Dark Theme">
                        <!-- Moon Icon -->
                        <svg viewBox="0 0 24 24" class="icon moon-icon"><path fill="currentColor" d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.5-.2 1.1-.8 1.3-3.9 1.3-6.7 4.9-6.7 9.1 0 5.2 4.4 9.5 9.7 9.1 3.5-.3 6.4-2.8 7.3-6.2.2-.6.7-.9 1.3-.8.6.1 1 .6.9 1.2-.8 4.7-4.8 8.1-9.8 8.2z"/></svg>
                        <!-- Sun Icon -->
                        <svg viewBox="0 0 24 24" class="icon sun-icon hidden"><path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                    </button>
                    <a class="activity-btn" href="https://github.com/venketeshswamy/Markdowns" target="_blank" title="View GitHub Repository" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                    </a>
                </div>
            </div>
            
            <!-- VS Code Explorer Sidebar Panel -->
            <div class="explorer-panel">
                <div class="sidebar-header">
                    <h2>EXPLORER: MARKMAPS</h2>
                </div>
                <!-- Search bar for filtering mindmaps -->
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" id="file-search" placeholder="Search files (e.g. SA 701)..." autocomplete="off" aria-label="Search markdown files">
                        <button id="search-clear-btn" class="hidden" title="Clear search">✕</button>
                    </div>
                </div>
                <!-- File Tree View -->
                <div class="file-tree-container">
                    <ul class="file-tree" id="file-tree-root">
                        <!-- Dynamically populated by app.js -->
                    </ul>
                </div>
            </div>
        </aside>
        
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Editor View Pane -->
        <main class="editor-pane">
            <!-- Tabs Bar -->
            <div class="tabs-bar-container">
                <div class="tabs-bar" id="tabs-bar">
                    <!-- Dynamically populated by app.js -->
                </div>
            </div>
            
            <!-- Editor Content Area -->
            <div class="editor-content">
                <!-- Welcome/Placeholder view -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-inner">
                        <div class="logo-animation">
                            <svg viewBox="0 0 100 100" class="welcome-logo">
                                <circle cx="50" cy="50" r="12" fill="var(--vscode-accent)"/>
                                <line x1="50" y1="50" x2="25" y2="30" stroke="var(--vscode-accent)" stroke-width="4"/>
                                <line x1="50" y1="50" x2="25" y2="70" stroke="var(--vscode-accent)" stroke-width="4"/>
                                <line x1="50" y1="50" x2="75" y2="50" stroke="var(--vscode-accent)" stroke-width="4"/>
                                <circle cx="25" cy="30" r="7" fill="var(--vscode-node1)"/>
                                <circle cx="25" cy="70" r="7" fill="var(--vscode-node2)"/>
                                <circle cx="75" cy="50" r="7" fill="var(--vscode-node3)"/>
                            </svg>
                        </div>
                        <h1>CA Final Markmaps</h1>
                        <p class="subtitle">Interactive Study Mind Maps Viewer</p>
                        
                        <div class="welcome-actions">
                            <div class="action-item">
                                <span class="action-key">Select a file</span>
                                <span class="action-desc">from the explorer sidebar to open a mind map</span>
                            </div>
                            <div class="action-item">
                                <span class="action-key">Search files</span>
                                <span class="action-desc">using the search bar at the top left</span>
                            </div>
                            <div class="action-item">
                                <span class="action-key">Double click</span>
                                <span class="action-desc">in the file list to pin the tab open</span>
                            </div>
                        </div>
                        
                        <div class="welcome-recent">
                            <h3>Browse Folders</h3>
                            <div class="folder-shortcuts" id="folder-shortcuts">
                                <!-- Populated dynamically -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Markmap Container -->
                <div class="markmap-container hidden" id="markmap-view-container">
                    <svg id="markmap-svg"></svg>
                    
                    <!-- Bottom Right Toolbar (Overlay) -->
                    <div class="markmap-toolbar">
                        <span class="toolbar-brand">markmap</span>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" id="toolbar-zoom-in" title="Zoom In">
                            <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <button class="toolbar-btn" id="toolbar-zoom-out" title="Zoom Out">
                            <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
                        </button>
                        <button class="toolbar-btn" id="toolbar-fit" title="Reset View / Fit to Screen">
                            <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M15 3h6v6h-2V5h-4V3zM9 3H3v6h2V5h4V3zm6 18h6v-6h-2v4h-4v2zm-6 0H3v-6h2v4h4v2z"/></svg>
                        </button>
                        <div class="toolbar-divider"></div>
                        <div class="export-dropdown-wrapper">
                            <button class="toolbar-btn export-btn" id="toolbar-export" title="Export Options">
                                <span>Export</span>
                                <svg viewBox="0 0 24 24" class="icon caret-icon"><path fill="currentColor" d="M7 10l5 5 5-5H7z"/></svg>
                            </button>
                            <div class="export-dropdown" id="export-dropdown">
                                <button class="dropdown-item" id="export-svg-btn">
                                    <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/></svg>
                                    <span>Download SVG</span>
                                </button>
                                <button class="dropdown-item" id="export-png-btn">
                                    <svg viewBox="0 0 24 24" class="icon"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3zm-5.55-8h-2.9v3H8l4 4 4-4h-2.55v-3z"/></svg>
                                    <span>Download PNG</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Load our file data, then the app script -->
    <script src="files-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
